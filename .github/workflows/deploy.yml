name: Deploy to Ahost

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            APP_DIR="/home/komakloy/komakWebSite"

            # Clone the repo if it doesn't exist yet, otherwise pull
            if [ ! -d "$APP_DIR/.git" ]; then
              echo "==> First deploy: cloning repo..."
              git clone https://github.com/Aomine01/komakloyihasi.git "$APP_DIR"
            else
              echo "==> Updating code..."
              cd "$APP_DIR"
              git pull origin main
            fi

            cd "$APP_DIR"

            echo "==> Writing .env.local..."
            cat > .env.local << EOF
            DB_HOST=${{ secrets.DB_HOST }}
            DB_PORT=3306
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_NAME=${{ secrets.DB_NAME }}
            NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
            NEXTAUTH_URL=${{ secrets.NEXTAUTH_URL }}
            EOF

            echo "==> Installing dependencies..."
            npm install --production=false

            echo "==> Building Next.js app..."
            npm run build

            echo "==> Restarting Node.js app (cPanel Passenger)..."
            mkdir -p tmp
            touch tmp/restart.txt

            echo "==> Deployed successfully!"
